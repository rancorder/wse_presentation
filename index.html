<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WSE Local Presenter</title>
<style>
:root{--bg:#05070c;--panel:#0c1728;--ink:#f7fbff;--muted:#9baec7;--line:rgba(255,255,255,.12);--orange:#ff7a1a;--orange2:#ffb36a;--green:#39dd94;--red:#ff626a;--blue:#37cfff}
*{box-sizing:border-box;margin:0;padding:0}html,body,#app{width:100%;height:100%;overflow:hidden}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:radial-gradient(circle at 80% 10%,rgba(255,122,26,.14),transparent 28%),linear-gradient(135deg,#03050a,#081426 55%,#020407);color:var(--ink)}button{font:inherit}
.stage{position:relative;width:100%;height:100%;background:#020407;overflow:hidden}.stage:before{content:"";position:absolute;inset:0;z-index:4;pointer-events:none;background:radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.55))}.stage:after{content:"";position:absolute;inset:34px;z-index:5;pointer-events:none;border:1px solid rgba(255,255,255,.09)}
.progressTrack{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.08);z-index:10}.progress{height:100%;width:11.111%;background:linear-gradient(90deg,var(--orange),#f3c65f);box-shadow:0 0 22px rgba(255,122,26,.75);transition:.25s}
.media{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#020407}.media.active{display:flex}.media img,.media video{width:100%;height:100%;object-fit:contain;background:#020407}.shade{position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(0,0,0,.18),transparent 16%,transparent 84%,rgba(0,0,0,.18))}
.hud{position:absolute;left:58px;top:48px;z-index:7;display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.58);font-size:12px;letter-spacing:.1em;font-weight:900;text-shadow:0 1px 8px #000}.logo{height:38px;min-width:74px;display:grid;place-items:center;color:#fff;letter-spacing:.22em;border:1px solid rgba(255,122,26,.5);background:linear-gradient(135deg,rgba(255,122,26,.25),rgba(255,122,26,.06));box-shadow:0 0 26px rgba(255,122,26,.22)}
.counter{position:absolute;right:58px;bottom:48px;z-index:7;color:rgba(255,255,255,.58);font-size:13px;letter-spacing:.14em;font-weight:900}.vflag{position:absolute;right:58px;top:52px;z-index:7;color:var(--orange2);font-size:12px;font-weight:900;letter-spacing:.14em;display:none}.vflag.on{display:block}
.vctrl{position:absolute;left:58px;bottom:48px;z-index:8;display:flex;gap:8px;opacity:.16;transition:.18s}.vctrl:hover{opacity:1}.vctrl button,.audOverlay button{border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.42);color:#fff;padding:8px 10px;cursor:pointer;font-size:12px;font-weight:900}
.presenter{display:grid;grid-template-columns:minmax(520px,60vw) minmax(400px,40vw);width:100%;height:100%}.previewPane{position:relative;padding:58px 26px 26px;border-right:1px solid var(--line);background:rgba(0,0,0,.18)}.previewShell{position:relative;width:100%;height:100%;border:1px solid rgba(255,255,255,.14);box-shadow:0 24px 80px rgba(0,0,0,.48);overflow:hidden}.notice{position:absolute;top:18px;left:26px;color:rgba(255,255,255,.54);font-size:12px;letter-spacing:.14em;font-weight:900}
.previewShell .hud{left:26px;top:24px;font-size:10px}.previewShell .logo{height:30px;min-width:58px}.previewShell .counter{right:26px;bottom:22px}.previewShell .vflag{right:26px;top:28px}.previewShell .stage:after{inset:20px}.previewShell .vctrl{display:none}
.panel{overflow:auto;padding:22px;background:linear-gradient(180deg,rgba(9,18,31,.97),rgba(4,7,12,.98))}.head{position:sticky;top:0;z-index:3;background:linear-gradient(180deg,rgba(9,18,31,1),rgba(9,18,31,.93));padding:8px 0 14px}.head h1{font-size:24px}.head p,.status{color:var(--muted);font-size:13px;line-height:1.6;margin-top:6px}.warn{border:1px solid rgba(255,98,106,.45);background:rgba(255,98,106,.10);color:#ffd0d3;padding:12px 14px;font-weight:900;line-height:1.55;margin:8px 0 14px}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.controls button{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.055);color:#fff;padding:12px 14px;cursor:pointer;font-weight:900}.controls .primary{background:linear-gradient(135deg,var(--orange),#b6420d);border-color:rgba(255,122,26,.55)}
.status{border:1px solid var(--line);background:rgba(255,255,255,.045);padding:12px 14px;margin-bottom:14px}.status b{color:var(--orange2)}.timer{font-size:20px;color:var(--green);font-weight:900}
.cues{display:flex;flex-direction:column;gap:12px}.cue{border:1px solid var(--line);background:rgba(255,255,255,.045);padding:16px;cursor:pointer;transition:.18s}.cue:hover{border-color:rgba(255,122,26,.35);transform:translateX(-2px)}.cue.active{border-color:rgba(255,122,26,.72);background:rgba(255,122,26,.12);box-shadow:0 0 28px rgba(255,122,26,.12)}.cueTop{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px}.cueNo{color:var(--orange2);font-weight:900;letter-spacing:.12em}.cueTitle{font-weight:900;font-size:17px}.badge{padding:7px 12px;border:1px solid rgba(255,122,26,.42);background:rgba(255,122,26,.12);color:var(--orange2);font-size:13px;font-weight:900}.mediaType{color:var(--blue);font-size:12px;font-weight:900;letter-spacing:.1em}.sec{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.07)}.lab{font-size:12px;color:#5d6e82;letter-spacing:.12em;font-weight:900;margin-bottom:6px}.txt{font-size:15px;line-height:1.8}.strong{font-size:18px;font-weight:900}.ask{color:#a9ffd7;font-weight:800}.tiny{color:var(--muted);font-size:13px;line-height:1.7}
.audOverlay{position:fixed;right:18px;top:14px;z-index:60;display:flex;gap:8px;opacity:.13;transition:.18s}.audOverlay:hover{opacity:1}
@media(max-width:980px){.presenter{grid-template-columns:1fr}.previewPane{display:none}.panel{height:100vh}.hud{left:24px;top:24px}.counter{right:24px;bottom:24px}.stage:after{inset:18px}.vflag{right:24px;top:28px}.vctrl{left:24px;bottom:24px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const slides=[
{type:"image",src:"assets/slide01.png",title:"表紙 / 問題提起",first:"本日、一番お伝えしたいのは、設計外注の良し悪しは“単価”ではなく“社内工数が減るかどうか”で見た方がよい、という点です。",talk:"溶接治具・溶接ライン設計では、安く外注できたように見えても、戻ってきた図面の確認、修正指示、再確認に社内設計者の時間が吸われることがあります。",point:"WSEを『安い外注先』ではなく『確認工数を増やさない外注先』として位置づける。",ask:"御社でも、外に出したのに社内側の確認が重くなった経験はありますか？"},
{type:"video",src:"assets/slide02.mp4",poster:"assets/slide02.png",loop:true,title:"ジグ動画 / 問題の可視化",first:"ここでは、設計外注で見えにくい“確認工数”をイメージとして見ていただきます。",talk:"図面を外に出しても、成立性確認が弱いと社内側が検証者になります。動画は、単なる演出ではなく『どこで確認すべきか』を見せるためのものです。",point:"動画を流しながら長く説明しすぎない。見せたあとに『確認工数』へ戻す。",ask:"外注先から戻った図面を、社内でどの程度チェックされていますか？"},
{type:"image",src:"assets/slide03.png",title:"隠れコスト",first:"外注費だけを見ると安く見えても、実際には社内確認・修正指示・再確認のコストが後から乗ってきます。",talk:"設計者の時間は見積書に出ません。しかし実務では、ここが一番高くつきます。",point:"価格競争ではなく、総工数比較へ視点を移す。",ask:"外注費よりも、戻ってきた後の確認工数が重く感じる場面はありますか？"},
{type:"image",src:"assets/slide04.png",title:"一般外注との差",first:"多くの手戻りは、図面作成中ではなく、着手前の前提確認が足りないことで発生します。",talk:"条件が曖昧なまま始めると、途中で問い合わせ、待機、修正が発生します。WSEは、着手前に条件・資料・前提を確認します。",point:"『修正対応します』ではなく『修正が出にくい進め方』を打ち出す。",ask:"発注時点で条件が完全に揃っていない案件は、どの程度ありますか？"},
{type:"image",src:"assets/slide05.png",title:"WSEの設計OS",first:"WSEの価値は、単に図面を描くことではなく、後から確認工数が増えにくい設計プロセスにあります。",talk:"条件確認、3D成立性、納期運用、STEP/DWG納品。この4つが揃うことで、外注した後の社内負担を抑えます。",point:"作業者ではなく、仕組みを持つ外注先に見せる。",ask:"外注先に求めたいのは、作図スピード・安さ・手戻りの少なさのどれが一番大きいですか？"},
{type:"image",src:"assets/slide06.png",title:"4ステップ",first:"WSEでは、手戻りを頑張って直すのではなく、発生する前に工程で潰します。",talk:"まずヒアリングで前提を揃え、Inventorで3D設計し、干渉・逃げ・組付けを確認し、その後に2D図面化・STEP/DWG納品を行います。",point:"工程説明は長くしない。『どこで手戻りを潰しているか』を中心に話す。",ask:"現在の外注先では、3D段階の成立性確認まで入っていますか？"},
{type:"video",src:"assets/slide07.mp4",poster:"assets/slide07.png",loop:true,title:"ジグ回転動画 / 成立性確認",first:"ここでは、3D段階で成立性を見る意味を、ジグの動きで確認いただきます。",talk:"干渉・逃げ・組付けは、2D図面になってから気づくと修正が大きくなります。3D段階で見ることで、図面化前に潰せます。",point:"動画の印象を『かっこいい』で終わらせず、『図面化前に確認する』へ接続する。",ask:"御社では、2D化前の3D確認はどこまで実施されていますか？"},
{type:"image",src:"assets/slide08.png",title:"向き不向き / 対応領域",first:"すべてに対応できる会社ではなく、得意領域を絞っているから品質と納期を守りやすくなります。",talk:"溶接治具、溶接ライン、短納期時の設計応援、過去図面ベースの展開・流用設計が得意です。工場プラント設計や専門外の大型設備一式は対象外です。",point:"対応範囲を絞ることで信頼感を出す。何でもできます感を出さない。",ask:"御社で切り出しやすいのは、新規設計・改造設計・流用設計のどれに近いですか？"},
{type:"image",src:"assets/slide09.png",title:"クロージング",first:"最後に一つだけ確認させてください。御社の中に、設計者が抱えているけれど外に出せていない案件はありますか？",talk:"もしあれば、まず設計のみで切り出せる1案件をお聞かせください。弊社側で対応可否と進め方をご提案します。",point:"売り込まず、案件有無の確認で終える。『次に何を出してもらうか』を明確化する。",ask:"候補案件がある場合、図面・仕様・過去データのどれから確認するのが進めやすいですか？"}
];
const params=new URLSearchParams(location.search),isAud=params.get("view")==="audience";let cur=parseInt(location.hash.replace("#s",""),10);if(isNaN(cur)||cur<0||cur>=slides.length)cur=0;let aud=null,start=Date.now();const ch=("BroadcastChannel"in window)?new BroadcastChannel("wse-local-sync-v1"):null;
function media(s,i){let a=i===cur?" active":"";return s.type==="video"?`<div class="media${a}"><video data-v="${i}" src="${s.src}" poster="${s.poster||""}" muted playsinline preload="auto" ${s.loop?"loop":""}></video><div class="shade"></div></div>`:`<div class="media${a}"><img src="${s.src}" alt="${s.title}"><div class="shade"></div></div>`}
function stage(){return`<div class="stage"><div class="progressTrack"><div class="progress"></div></div>${slides.map(media).join("")}<div class="hud"><div class="logo">WSE</div><div>LOCAL PRESENTATION<br>IMAGE + SHORT VIDEO</div></div><div class="vflag">VIDEO / AUTO LOOP</div><div class="counter">01 / 09</div><div class="vctrl"><button onclick="restartVideo()">動画を最初から</button><button onclick="toggleVideo()">停止/再生</button></div></div>`}
function setSlide(n,src="local"){if(n<0||n>=slides.length)return;cur=n;document.querySelectorAll(".media").forEach((m,i)=>m.classList.toggle("active",i===cur));document.querySelectorAll(".progress").forEach(p=>p.style.width=((cur+1)/slides.length*100)+"%");document.querySelectorAll(".counter").forEach(c=>c.textContent=String(cur+1).padStart(2,"0")+" / "+String(slides.length).padStart(2,"0"));document.querySelectorAll(".vflag").forEach(f=>f.classList.toggle("on",slides[cur].type==="video"));document.querySelectorAll(".cue").forEach((c,i)=>c.classList.toggle("active",i===cur));resetVideos();let ac=document.querySelector(".cue.active");if(ac&&src==="local")ac.scrollIntoView({block:"center",behavior:"smooth"});history.replaceState(null,"","#s"+cur);if(!isAud&&src!=="remote")sync()}
function resetVideos(){document.querySelectorAll("video").forEach(v=>{let i=parseInt(v.dataset.v,10);try{if(i===cur){v.pause();v.currentTime=0;let p=v.play();if(p&&p.catch)p.catch(()=>{})}else{v.pause();v.currentTime=0}}catch(e){}})}
function restartVideo(){document.querySelectorAll(`video[data-v="${cur}"]`).forEach(v=>{try{v.pause();v.currentTime=0;v.play()}catch(e){}})}
function toggleVideo(){document.querySelectorAll(`video[data-v="${cur}"]`).forEach(v=>{v.paused?v.play():v.pause()})}
function sync(){let m={type:"wse-slide",slide:cur,at:Date.now()};if(aud&&!aud.closed)aud.postMessage(m,"*");if(ch)ch.postMessage(m);try{localStorage.setItem("wse-local-sync-v1",JSON.stringify(m))}catch(e){}}
function openAud(){let u=new URL(location.href);u.searchParams.set("view","audience");u.hash="s"+cur;aud=window.open(u.toString(),"WSE_AUDIENCE","popup=yes,width=1440,height=900");setTimeout(sync,300);let st=document.getElementById("audStatus");if(st)st.innerHTML=aud?"顧客表示：<b>別ウィンドウ起動済み。この別ウィンドウだけ共有。</b>":"顧客表示：<b>ポップアップがブロックされています。</b>"}
function fs(){if(!document.fullscreenElement&&document.documentElement.requestFullscreen)document.documentElement.requestFullscreen();else if(document.exitFullscreen)document.exitFullscreen()}
function presenter(){document.getElementById("app").innerHTML=`<div class="presenter"><div class="previewPane"><div class="notice">発表者ビュー：この画面は共有しない</div><div class="previewShell">${stage()}</div></div><aside class="panel"><div class="head"><h1>WSE ローカル台本操作型プレゼン</h1><p>スライド2・7は動画対応。顧客には別ウィンドウだけ共有。</p></div><div class="warn">⚠ この画面を共有すると台本が見えます。「顧客表示を開く」で開いた別ウィンドウだけ共有してください。</div><div class="controls"><button class="primary" id="open">顧客表示を開く</button><button id="full">全画面</button></div><div class="controls"><button id="prev">← 前へ</button><button id="next">次へ →</button></div><div class="controls"><button id="rv">動画を最初から</button><button id="copy">質問をコピー</button></div><div class="status"><div id="audStatus">顧客表示：<b>未起動</b></div><div>経過時間：<b class="timer" id="timer">00:00</b></div><div>操作：Space / → 次へ、← 前へ、1〜9 指定、R 動画再開</div></div><div class="cues">${slides.map((s,i)=>`<article class="cue" data-i="${i}"><div class="cueTop"><div><div class="cueNo">${String(i+1).padStart(2,"0")} / ${s.type.toUpperCase()}</div><div class="cueTitle">${s.title}</div></div><span class="badge">${String(i+1).padStart(2,"0")}</span></div><div class="mediaType">${s.type==="video"?"VIDEO SLIDE / 自動再生":"IMAGE SLIDE"}</div><div class="sec"><div class="lab">一言目</div><div class="txt strong">${s.first}</div></div><div class="sec"><div class="lab">補足説明</div><div class="txt">${s.talk}</div></div><div class="sec"><div class="lab">押さえるポイント</div><div class="tiny">${s.point}</div></div><div class="sec"><div class="lab">相手に投げる質問</div><div class="txt ask">${s.ask}</div></div></article>`).join("")}</div></aside></div>`;document.querySelectorAll(".cue").forEach(c=>c.onclick=()=>setSlide(parseInt(c.dataset.i,10)));document.getElementById("open").onclick=openAud;document.getElementById("full").onclick=fs;document.getElementById("prev").onclick=()=>setSlide(cur-1);document.getElementById("next").onclick=()=>setSlide(cur+1);document.getElementById("rv").onclick=restartVideo;document.getElementById("copy").onclick=async()=>{try{await navigator.clipboard.writeText(slides[cur].ask)}catch(e){alert(slides[cur].ask)}};setInterval(()=>{let sec=Math.floor((Date.now()-start)/1000),m=String(Math.floor(sec/60)).padStart(2,"0"),s=String(sec%60).padStart(2,"0"),t=document.getElementById("timer");if(t)t.textContent=`${m}:${s}`},500);setSlide(cur,"remote")}
function audience(){document.getElementById("app").innerHTML=stage();let o=document.createElement("div");o.className="audOverlay";o.innerHTML='<button onclick="fs()">全画面</button><button onclick="restartVideo()">動画再開</button>';document.body.appendChild(o);window.onmessage=e=>{if(e.data&&e.data.type==="wse-slide")setSlide(e.data.slide,"remote")};if(ch)ch.onmessage=e=>{if(e.data&&e.data.type==="wse-slide")setSlide(e.data.slide,"remote")};window.addEventListener("storage",e=>{if(e.key==="wse-local-sync-v1"&&e.newValue){try{let m=JSON.parse(e.newValue);if(m.type==="wse-slide")setSlide(m.slide,"remote")}catch(_){}}});setSlide(cur,"remote")}
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key===" "||e.key==="PageDown"){e.preventDefault();setSlide(cur+1)}if(e.key==="ArrowLeft"||e.key==="PageUp"){e.preventDefault();setSlide(cur-1)}if(/^[1-9]$/.test(e.key))setSlide(parseInt(e.key,10)-1);if(e.key.toLowerCase()==="r")restartVideo();if(e.key.toLowerCase()==="f"&&isAud)fs()});
isAud?audience():presenter();
</script>
</body>
</html>
